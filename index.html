<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE — Живая Соцсеть</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050508;
            --panel-bg: rgba(13, 14, 24, 0.65);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f9;
            --text-muted: #626575;
            --neon-pink: #ff007f;
            --neon-purple: #7928ca;
            --neon-cyan: #00f3ff;
            --neon-green: #39ff14;
            --pulse-gradient: linear-gradient(45deg, #7928ca, #ff007f, #00f3ff);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 80% 20%, #170d2b, var(--bg-dark) 60%),
                        radial-gradient(circle at 10% 80%, #092327, var(--bg-dark) 60%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .screen { width: 100%; height: 100%; display: flex; }
        .hidden { display: none !important; }

        #auth-screen {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0e0a1a 0%, #030305 100%);
            width: 100%;
        }

        .auth-card {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(121, 40, 202, 0.1);
        }

        .auth-card h2 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            background: var(--pulse-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .auth-card p { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
        .pulse-heart { font-size: 40px; margin-bottom: 15px; animation: heartbeat 1.2s infinite ease-in-out; }
        /* Текстовые уведомления вместо alert */
        #auth-status {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            min-height: 18px;
            transition: 0.3s ease;
        }
        .status-error { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 127, 0.4); }
        .status-success { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }

        /* Поля ввода */
        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(4, 4, 6, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            margin-bottom: 18px;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-cyan);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.25);
            background: rgba(0, 0, 0, 0.8);
        }

        /* Кнопки */
        .auth-buttons { display: flex; flex-direction: column; gap: 12px; }

        button {
            cursor: pointer;
            border: none;
            font-weight: 600;
            transition: 0.2s;
        }

        .btn-primary {
            padding: 16px;
            background: var(--pulse-gradient);
            background-size: 200% auto;
            color: white;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.3);
        }
        .btn-primary:hover {
            background-position: right center;
            box-shadow: 0 4px 25px rgba(0, 243, 255, 0.5);
            transform: translateY(-1px);
        }

        .btn-secondary {
            padding: 16px;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.04); }

        /* Главный интерфейс */
        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 45px;
            background: var(--pulse-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo .dot { -webkit-text-fill-color: var(--neon-pink); }
        nav { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        nav a {
            text-decoration: none;
            color: #a0a5b5;
            padding: 14px 18px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: 0.25s;
        }
        nav a.active, nav a:hover {
            background: rgba(121, 40, 202, 0.15);
            color: #fff;
            border-left: 4px solid var(--neon-pink);
            padding-left: 14px;
        }

        .user-profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar-plug {
            width: 36px;
            height: 36px;
            background: var(--pulse-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .btn-logout { background: transparent; color: var(--text-muted); font-size: 13px; }
        .btn-logout:hover { color: var(--neon-pink); }

        /* Чат */
        .chat-container { flex: 1; display: flex; flex-direction: column; }

        .chat-header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(13, 14, 24, 0.4);
            backdrop-filter: blur(10px);
        }
        .online-status { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .status-text { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: dotPulse 1.5s infinite;
        }

        .messages-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 55%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: msgAppear 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .msg .sender {
            font-size: 11px;
            color: var(--neon-cyan);
            margin-bottom: 6px;
            display: block;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .msg.incoming {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }
        .msg.outgoing {
            background: linear-gradient(135deg, var(--neon-purple), #4a148c);
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .msg.outgoing .sender { color: #ff80df; }

        .message-input-area {
            padding: 25px 40px;
            display: flex;
            gap: 15px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
        }
        .message-input-area input { margin: 0; }

        .btn-send {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 28px;
            background: var(--pulse-gradient);
            color: white;
            border-radius: 14px;
            font-size: 15px;
        }
        .btn-send:hover { box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.15); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes dotPulse {
            0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(57, 255, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        @keyframes msgAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
    </style>
</head>
<body>

    <!-- Окно авторизации -->
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <div class="pulse-heart">💚</div>
            <h2>PULSE</h2>
            <p>Подключись к единому ритму</p>
            
            <!-- Сюда будут красиво выводиться ошибки/успех -->
            <div id="auth-status"></div>

            <input type="email" id="email-input" placeholder="Введите ваше имя">
            <input type="password" id="password-input" placeholder="Пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="btn-primary">Войти</button>
                <button id="register-btn" class="btn-secondary">Создать аккаунт</button>
            </div>
        </div>
    </div>

    <!-- Главный экран соцсети -->
    <div id="app-screen" class="screen hidden">
        <aside class="sidebar">
            <div class="logo">PULSE<span class="dot">.</span></div>
            <nav>
                <a href="#" class="active">⚡ Чат-Комната</a>
                <a href="#">👤 Мой Пульс</a>
                <a href="#">👥 Друзья</a>
            </nav>
            <div class="user-profile">
                <div class="user-info">
                    <div class="avatar-plug">P</div>
                    <span id="user-display-name">Пользователь</span>
                </div>
                <button id="logout-btn" class="btn-logout">Выйти</button>
            </div>
        </aside>

        <main class="chat-container">
            <div class="chat-header">
                <div class="header-info">
                    <h3>Основной Канал</h3>
                    <div class="online-status">
                        <span class="pulse-dot"></span>
                        <span class="status-text">сеть пульсирует</span>
                    </div>
                </div>
            </div>
            
            <div id="chat-messages" class="messages-area">
                <!-- Сюда летят сообщения -->
            </div>

            <form id="message-form" class="message-input-area">
                <input type="text" id="message-input" placeholder="Напиши что-нибудь..." autocomplete="off" required>
                <button type="submit" class="btn-send">
                    <span>Отправить</span>
                    <svg class="send-icon" viewBox="0 0 24 24" style="width:16px; height:16px;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" fill="currentColor"/></svg>
                </button>
            </form>
        </main>
    </div>
    <!-- Подключаем Firebase через обычные глобальные скрипты (Защита от CORS) -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // Твоя конфигурация Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyADDpr8MTqi33HmM8mN2b2r-CB9bCRPy4c",
            authDomain: "://firebaseapp.com",
            projectId: "pulse-66146",
            storageBucket: "pulse-66146.firebasestorage.app",
            messagingSenderId: "346611623663",
            appId: "1:346611623663:web:d7b319b063da543ed1dd1a",
            measurementId: "G-3FXVBG5PJT",
            databaseURL: "https://firebasedatabase.app"
        };

        // Инициализируем базу данных через совместимый синтаксис
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Привязываем элементы интерфейса
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const usernameInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userDisplayName = document.getElementById('user-display-name');
        const chatMessages = document.getElementById('chat-messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const avatarPlug = document.querySelector('.avatar-plug');
        const authStatus = document.getElementById('auth-status');

        let currentUserName = localStorage.getItem('pulse_user') || null;

        // Плавный вывод статуса вместо alert
        function showMsg(text, type) {
            authStatus.textContent = text;
            authStatus.className = type === 'error' ? 'status-error' : 'status-success';
            setTimeout(() => { authStatus.textContent = ''; }, 4000);
        }
        function checkAuth() {
            if (currentUserName) {
                userDisplayName.textContent = currentUserName;
                if (avatarPlug) avatarPlug.textContent = currentUserName.charAt(0).toUpperCase();
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                loadMessages();
            } else {
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        }

        // РЕГИСТРАЦИЯ ПО ИМЕНИ
        registerBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;

            if (!name || !pass) return showMsg('Заполни имя и пароль, бро!', 'error');
            if (name.length < 3) return showMsg('Имя должно быть от 3 символов!', 'error');

            try {
                const snapshot = await db.ref(`users/${name}`).get();

                if (snapshot.exists()) {
                    showMsg('Это имя уже занято!', 'error');
                } else {
                    await db.ref(`users/${name}`).set({ password: pass });
                    currentUserName = name;
                    localStorage.setItem('pulse_user', name);
                    showMsg('Вход выполнен!', 'success');
                    setTimeout(checkAuth, 500);
                }
            } catch (e) { showMsg('Ошибка записи: ' + e.message, 'error'); }
        });

        // ВХОД ПО ИМЕНИ
        loginBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;

            if (!name || !pass) return showMsg('Введи имя и пароль!', 'error');

            try {
                const snapshot = await db.ref(`users/${name}`).get();

                if (snapshot.exists() && snapshot.val().password === pass) {
                    currentUserName = name;
                    localStorage.setItem('pulse_user', name);
                    showMsg('Успешный вход!', 'success');
                    setTimeout(checkAuth, 500);
                } else {
                    showMsg('Неверное имя или пароль!', 'error');
                }
            } catch (e) { showMsg('Ошибка входа: ' + e.message, 'error'); }
        });

        logoutBtn.addEventListener('click', () => {
            currentUserName = null;
            localStorage.removeItem('pulse_user');
            checkAuth();
        });
        // ОТПРАВКА СООБЩЕНИЯ
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!messageInput.value.trim() || !currentUserName) return;

            try {
                const messagesRef = db.ref('messages');
                const newMessageRef = messagesRef.push();
                await newMessageRef.set({
                    text: messageInput.value,
                    senderName: currentUserName,
                    timestamp: Date.now()
                });
                messageInput.value = '';
            } catch (error) { console.error("Ошибка при отправке: ", error); }
        });

        // СТРИМИНГ СООБЩЕНИЙ В РЕАЛЬНОМ ВРЕМЕНИ
        function loadMessages() {
            const messagesRef = db.ref('messages');
            messagesRef.on('value', (snapshot) => {
                chatMessages.innerHTML = '';
                snapshot.forEach((childSnapshot) => {
                    const data = childSnapshot.val();
                    const isMe = data.senderName === currentUserName;
                    const messageElement = document.createElement('div');
                    messageElement.classList.add('msg', isMe ? 'outgoing' : 'incoming');
                    
                    const nickname = data.senderName ? data.senderName : 'Аноним';
                    
                    messageElement.innerHTML = `
                        <span class="sender">${isMe ? 'Ты' : nickname}</span>
                        <p>${data.text}</p>
                    `;
                    chatMessages.appendChild(messageElement);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        // Запуск проверки авторизации при старте
        checkAuth();
    </script>
</body>
</html>
