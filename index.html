<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE — Живая Соцсеть</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #050508;
            --panel-bg: rgba(13, 14, 24, 0.65);
            --border-color: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f9;
            --text-muted: #626575;
            --neon-pink: #ff007f;
            --neon-purple: #7928ca;
            --neon-cyan: #00f3ff;
            --neon-green: #39ff14;
            --pulse-gradient: linear-gradient(45deg, #7928ca, #ff007f, #00f3ff);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: radial-gradient(circle at 80% 20%, #170d2b, var(--bg-dark) 60%),
                        radial-gradient(circle at 10% 80%, #092327, var(--bg-dark) 60%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .screen { width: 100%; height: 100%; display: flex; }
        .hidden { display: none !important; }

        #auth-screen {
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, #0e0a1a 0%, #030305 100%);
            width: 100%;
        }

        .auth-card {
            background: var(--panel-bg);
            backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8), 0 0 50px rgba(121, 40, 202, 0.1);
        }

        .auth-card h2 {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 2px;
            background: var(--pulse-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }

        .auth-card p { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
        .pulse-heart { font-size: 40px; margin-bottom: 15px; animation: heartbeat 1.2s infinite ease-in-out; }
        #auth-status {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 15px;
            min-height: 18px;
            transition: 0.3s ease;
        }
        .status-error { color: var(--neon-pink); text-shadow: 0 0 10px rgba(255, 0, 127, 0.4); }
        .status-success { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }

        input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(4, 4, 6, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            color: white;
            font-size: 15px;
            margin-bottom: 18px;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--neon-cyan);
            outline: none;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.25);
            background: rgba(0, 0, 0, 0.8);
        }

        .auth-buttons { display: flex; flex-direction: column; gap: 12px; }

        button { cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }

        .btn-primary {
            padding: 16px;
            background: var(--pulse-gradient);
            background-size: 200% auto;
            color: white;
            border-radius: 14px;
            box-shadow: 0 4px 20px rgba(255, 0, 127, 0.3);
        }
        .btn-primary:hover {
            background-position: right center;
            box-shadow: 0 4px 25px rgba(0, 243, 255, 0.5);
            transform: translateY(-1px);
        }

        .btn-secondary {
            padding: 16px;
            background: transparent;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
        }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.04); }

        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 30px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 45px;
            background: var(--pulse-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo .dot { -webkit-text-fill-color: var(--neon-pink); }

        nav { flex: 1; display: flex; flex-direction: column; gap: 10px; }
        nav a {
            text-decoration: none;
            color: #a0a5b5;
            padding: 14px 18px;
            border-radius: 12px;
            font-weight: 600;
            display: flex;
            align-items: center;
            transition: 0.25s;
        }
        nav a.active, nav a:hover {
            background: rgba(121, 40, 202, 0.15);
            color: #fff;
            border-left: 4px solid var(--neon-pink);
            padding-left: 14px;
        }

        .user-profile {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 20px;
            border-top: 1px solid var(--border-color);
        }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .avatar-plug {
            width: 36px;
            height: 36px;
            background: var(--pulse-gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .btn-logout { background: transparent; color: var(--text-muted); font-size: 13px; }
        .btn-logout:hover { color: var(--neon-pink); }

        .chat-container { flex: 1; display: flex; flex-direction: column; }

        .chat-header {
            padding: 24px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(13, 14, 24, 0.4);
            backdrop-filter: blur(10px);
        }
        .online-status { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
        .status-text { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: dotPulse 1.5s infinite;
        }

        .messages-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .msg {
            max-width: 55%;
            padding: 14px 20px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.5;
            position: relative;
            animation: msgAppear 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        .msg .sender {
            font-size: 11px;
            color: var(--neon-cyan);
            margin-bottom: 6px;
            display: block;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .msg.incoming {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            align-self: flex-start;
            border-top-left-radius: 4px;
        }
        .msg.outgoing {
            background: linear-gradient(135deg, var(--neon-purple), #4a148c);
            border: 1px solid rgba(255, 255, 255, 0.1);
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        .msg.outgoing .sender { color: #ff80df; }

        .message-input-area {
            padding: 25px 40px;
            display: flex;
            gap: 15px;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
        }
        .message-input-area input { margin: 0; }

        .btn-send {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 28px;
            background: var(--pulse-gradient);
            color: white;
            border-radius: 14px;
            font-size: 15px;
        }
        .btn-send:hover { box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            20% { transform: scale(1.15); }
            40% { transform: scale(1); }
            60% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }

        @keyframes dotPulse {
            0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(57, 255, 20, 0); }
            100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
        }

        @keyframes msgAppear {
            from { opacity: 0; transform: translateY(20px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

                /* Общий контейнер контента */
        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: rgba(4, 4, 6, 0.2);
        }

        .page-section {
            max-width: 900px;
            margin: 0 auto;
            animation: fadeIn 0.4s ease;
        }

        /* Карточка Профиля */
        .profile-card {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 35px;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .profile-main-info {
            display: flex;
            gap: 35px;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 30px;
            margin-bottom: 25px;
        }

        .profile-avatar-zone {
            text-align: center;
        }

        .user-avatar {
            width: 110px;
            height: 110px;
            background: var(--pulse-gradient);
            border-radius: 32px; /* Фирменная фишка: не круглые, а стильные закругленные квадраты */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 42px;
            font-weight: 900;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
            box-shadow: 0 0 30px rgba(121, 40, 202, 0.3);
        }

        .btn-edit-avatar {
            background: transparent;
            color: var(--text-muted);
            font-size: 11px;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-edit-avatar:hover { color: var(--neon-cyan); }

        .profile-text-zone h1 {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        /* Инпут статуса прямо в тексте */
        #prof-status-input {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            color: var(--text-muted);
            font-size: 15px;
            width: 100%;
        }
        #prof-status-input:focus {
            color: var(--text-main);
            box-shadow: none;
            border-bottom: 1px solid var(--neon-cyan);
        }

        .profile-link {
            font-size: 13px;
            color: var(--neon-pink);
            font-weight: 600;
            margin-top: 10px;
        }

        /* Статистика */
        .profile-stats {
            display: flex;
            gap: 50px;
        }

        .stat-box h5 {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .stat-box span {
            font-size: 24px;
            font-weight: 800;
            color: var(--neon-cyan);
        }

        /* Создание Поста */
        .create-post-card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }

        .create-post-card h3 {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #a0a5b5;
        }

        textarea {
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 15px;
            resize: none;
            transition: 0.3s;
        }
        textarea:focus {
            outline: none;
            border-color: var(--neon-purple);
            box-shadow: 0 0 15px rgba(121, 40, 202, 0.2);
        }

        .post-form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .post-attach-btn {
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
        }
        .post-attach-btn:hover { color: var(--text-main); }

        .btn-pulse-post {
            padding: 12px 25px;
            background: var(--pulse-gradient);
            color: white;
            border-radius: 10px;
            font-size: 14px;
        }

                /* Перестраиваем главный экран */
        #app-screen {
            flex-direction: column;
            position: relative;
            height: 100vh;
            width: 100vw;
        }

        /* Контентная зона на весь экран с отступом снизу под меню */
        .content-area {
            flex: 1;
            width: 100%;
            padding: 40px 40px 120px 40px; /* 120px снизу, чтобы меню не перекрывало контент */
            overflow-y: auto;
            background: transparent;
        }

        /* Контейнер для нижнего меню */
        .bottom-dock-container {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            pointer-events: none; /* Чтобы сквозь пустую зону можно было кликать */
            z-index: 999;
        }

        /* Парящая док-панель */
        .bottom-dock {
            pointer-events: auto; /* Возвращаем кликабельность кнопкам */
            display: flex;
            gap: 15px;
            background: rgba(13, 14, 24, 0.75);
            backdrop-filter: blur(30px);
            padding: 10px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 
                        0 0 30px rgba(121, 40, 202, 0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Элемент меню */
        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #a0a5b5;
            width: 75px;
            height: 65px;
            border-radius: 16px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dock-icon {
            font-size: 20px;
            margin-bottom: 4px;
            transition: transform 0.25s ease;
        }

        .dock-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
            transition: opacity 0.25s ease;
        }

        /* Эффекты при наведении: кнопка плавно приподнимается */
        .dock-item:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-8px);
        }
        .dock-item:hover .dock-icon {
            transform: scale(1.15);
        }

        /* Активный пункт (куда нажали) */
        .dock-item.active {
            background: var(--pulse-gradient);
            color: #fff;
            box-shadow: 0 10px 20px rgba(255, 0, 127, 0.25),
                        0 0 15px rgba(0, 243, 255, 0.2);
        }
        .dock-item.active .dock-label {
            opacity: 1;
        }

        /* Кнопка выхода */
        .logout-item:hover {
            background: rgba(255, 0, 127, 0.15);
            color: var(--neon-pink);
        }

        /* Мини-логотип внутри профиля */
        .logo-mini {
            font-size: 12px;
            font-weight: 900;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 4px;
        }


    </style>
</head>
<body>

    <!-- Окно авторизации -->
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <div class="pulse-heart">💚</div>
            <h2>PULSE</h2>
            <p>Подключись к единому ритму</p>
            
            <div id="auth-status"></div>

            <input type="text" id="email-input" placeholder="Введите ваше имя">
            <input type="password" id="password-input" placeholder="Секретный пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="btn-primary">Войти</button>
                <button id="register-btn" class="btn-secondary">Создать аккаунт</button>
            </div>
        </div>
    </div>

        <!-- Главный экран соцсети с нижним меню -->
    <div id="app-screen" class="screen hidden">
        
        <!-- Верхняя контентная зона (теперь на всю ширину) -->
        <main class="content-area">
            
            <!-- РАЗДЕЛ 1: МОЙ ПУЛЬС (ПРОФИЛЬ) -->
            <div id="page-profile" class="page-section">
                <!-- Карточка Профиля -->
                <div class="profile-card">
                    <div class="profile-main-info">
                        <div class="profile-avatar-zone">
                            <div class="user-avatar" id="prof-avatar">P</div>
                            <button class="btn-edit-avatar">⚡ Сменить код</button>
                        </div>
                        <div class="profile-text-zone">
                            <div class="logo-mini">PULSE<span class="dot">.</span></div>
                            <h1 id="prof-name">Загрузка...</h1>
                            <div class="profile-status-wrapper">
                                <input type="text" id="prof-status-input" value="Настроить частоту пульса..." placeholder="Твой статус">
                            </div>
                        </div>
                    </div>
                    
                    <!-- Твои показатели в сети -->
                    <div class="profile-stats">
                        <div class="stat-box"><h5>Синхронизации</h5><span id="stat-friends">0</span></div>
                        <div class="stat-box"><h5>Вибрации</h5><span id="stat-posts">0</span></div>
                        <div class="stat-box"><h5>Треки</h5><span id="stat-tracks">0</span></div>
                    </div>
                </div>

                <!-- Стена постов -->
                <div class="wall-section">
                    <div class="create-post-card">
                        <h3>Запустить новую вибрацию в сеть</h3>
                        <form id="post-form">
                            <textarea id="post-text-input" placeholder="Что у тебя на уме, бро? Напиши что-нибудь..." required></textarea>
                            <div class="post-form-footer">
                                <div class="post-attach-btn">➕ Добавить медиа</div>
                                <button type="submit" class="btn-pulse-post">Импульс ⚡</button>
                            </div>
                        </form>
                    </div>
                    <div id="profile-wall-posts" class="posts-feed">
                        <!-- Посты -->
                    </div>
                </div>
            </div>

            <!-- РАЗДЕЛ 2: СООБЩЕНИЯ (Заглушка, её наполним следующим шагом) -->
            <div id="page-messages" class="page-section hidden">
                <div class="profile-card">
                    <h2>Твои Диалоги</h2>
                    <p style="color: var(--text-muted); margin-top: 10px;">Раздел сообщений в разработке...</p>
                </div>
            </div>

        </main>

        <!-- 🌌 НАШЕ НОВОЕ НИЖНЕЕ МЕНЮ (DOCK-ПАНЕЛЬ) -->
        <div class="bottom-dock-container">
            <nav class="bottom-dock">
                <a href="#" id="link-profile" class="dock-item active" data-target="page-profile">
                    <span class="dock-icon">👤</span>
                    <span class="dock-label">Мой Пульс</span>
                </a>
                <a href="#" id="link-news" class="dock-item" data-target="page-news">
                    <span class="dock-icon">📰</span>
                    <span class="dock-label">Лента</span>
                </a>
                <a href="#" id="link-messages" class="dock-item" data-target="page-messages">
                    <span class="dock-icon">💬</span>
                    <span class="dock-label">Сообщения</span>
                </a>
                <a href="#" id="link-music" class="dock-item" data-target="page-music">
                    <span class="dock-icon">🎵</span>
                    <span class="dock-label">Музыка</span>
                </a>
                <a href="#" id="link-logout" class="dock-item logout-item">
                    <span class="dock-icon">🚪</span>
                    <span class="dock-label">Выйти</span>
                </a>
            </nav>
        </div>

    </div>

    <!-- Наш собственный сетевой мост Firebase (REST API) -->
    <script>
        // 1. Интеграция firebase-app.js
        (function() {
            'use strict';
            class FirebaseApp {
                constructor(options, name) {
                    this.options = options;
                    this.name = name || '[DEFAULT]';
                }
                database() { 
                    return window.firebase.database(this); 
                }
            }
            const appsMap = new Map();
            const firebaseNamespace = {
                initializeApp: function(options, config) {
                    const name = (config && config.name) || '[DEFAULT]';
                    if (appsMap.has(name)) return appsMap.get(name);
                    const newApp = new FirebaseApp(options, name);
                    appsMap.set(name, newApp);
                    return newApp;
                },
                app: function(name) {
                    const appName = name || '[DEFAULT]';
                    if (!appsMap.has(appName)) throw new Error("No Firebase App created");
                    return appsMap.get(appName);
                }
            };
            if (typeof window !== 'undefined') window.firebase = firebaseNamespace;
            if (typeof globalThis !== 'undefined') globalThis.firebase = firebaseNamespace;
        })();

        // 2. Интеграция firebase-database.js
        (function() {
            'use strict';
            if (typeof firebase === 'undefined') return;

            class DataSnapshotCompat {
                constructor(key, value) {
                    this.key = key;
                    this._value = value;
                }
                val() { return this._value; }
                exists() { return this._value !== null && this._value !== undefined; }
            }

            class ReferenceCompat {
                constructor(path, dbRef) {
                    this.path = path || '';
                    this.db = dbRef;
                    this.key = this.path.split('/').pop() || null;
                }
                child(childPath) {
                    return new ReferenceCompat(this.path + '/' + childPath, this.db);
                }
                getURL() {
                    return this.db.url + '/' + this.path + '.json?auth=' + this.db.key;
                }
                set(value) {
                    return fetch(this.getURL(), { method: 'PUT', body: JSON.stringify(value) }).then(r => r.json());
                }
                push(value) {
                    const genId = 'id_' + Math.floor(Math.random() * 1000000);
                    const newRef = this.child(genId);
                    if (value !== undefined) newRef.set(value);
                    return newRef;
                }
                update(value) {
                    return fetch(this.getURL(), { method: 'PATCH', body: JSON.stringify(value) }).then(r => r.json());
                }
                once(type) {
                    return fetch(this.getURL()).then(r => r.json()).then(data => new DataSnapshotCompat(this.key, data));
                }
                on(type, callback) {
                    const run = () => {
                        this.once().then(snap => { if (callback) callback(snap); });
                    };
                    run();
                    const intervalId = setInterval(run, 3000);
                    window._fb_intervals = window._fb_intervals || [];
                    window._fb_intervals.push(intervalId);
                    return callback;
                }
                off() {
                    if (window._fb_intervals) {
                        window._fb_intervals.forEach(clearInterval);
                        window._fb_intervals = [];
                    }
                }
                transaction(updateFn, onComplete) {
                    return this.once().then(snap => {
                        const newVal = updateFn(snap.val());
                        return this.set(newVal).then(() => {
                            const finalSnap = new DataSnapshotCompat(this.key, newVal);
                            if (onComplete) onComplete(null, true, finalSnap);
                            return { committed: true, snapshot: finalSnap };
                        });
                    });
                }
            }

            class DatabaseCompat {
                constructor(app) {
                    // Просто берем твою ссылку целиком, без всяких replace
                    this.url = "https://pulse-66146-default-rtdb.europe-west1.firebasedatabase.app";
                    this.key = app.options.apiKey;
                }
                ref(path) { return new ReferenceCompat(path, this); }
            }


            firebase.database = function(app) {
                return new DatabaseCompat(app || firebase.app());
            };
        })();
        // 3. Инициализация твоей личной базы данных PULSE
        const firebaseConfig = {
            apiKey: "AIzaSyADDpr8MTqi33HmM8mN2b2r-CB9bCRPy4c",
            authDomain: "://firebaseapp.com",
            projectId: "pulse-66146",
            storageBucket: "pulse-66146.firebasestorage.app",
            messagingSenderId: "346611623663",
            appId: "1:346611623663:web:d7b319b063da543ed1dd1a",
            measurementId: "G-3FXVBG5PJT",
            databaseURL: "https://firebasedatabase.app"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Поиск элементов на экране
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const usernameInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userDisplayName = document.getElementById('user-display-name');
        const chatMessages = document.getElementById('chat-messages');
        const messageForm = document.getElementById('message-form');
        const messageInput = document.getElementById('message-input');
        const avatarPlug = document.querySelector('.avatar-plug');
        const authStatus = document.getElementById('auth-status');

        let currentUserName = localStorage.getItem('pulse_user') || null;

        // Показ ошибок прямо на форме входа без alert
        function showMsg(text, type) {
            authStatus.textContent = text;
            authStatus.className = type === 'error' ? 'status-error' : 'status-success';
            setTimeout(() => { authStatus.textContent = ''; }, 4000);
        }

                // Логика плавного переключения нижнего меню (Dock)
        const dockItems = document.querySelectorAll('.dock-item:not(.logout-item)');
        const pageSections = document.querySelectorAll('.page-section');

        dockItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                
                // Убираем активный класс у всех кнопок меню
                dockItems.forEach(i => i.classList.remove('active'));
                // Добавляем нажатой кнопке
                item.classList.add('active');

                // Скрываем все разделы сайта
                pageSections.forEach(section => section.classList.add('hidden'));
                
                // Показываем нужный раздел по data-target атрибуту
                const targetId = item.getAttribute('data-target');
                const targetSection = document.getElementById(targetId);
                if (targetSection) {
                    targetSection.classList.remove('hidden');
                }
            });
        });

        // Перепривязываем старую кнопку Выйти на новую нижнюю кнопку
        document.getElementById('link-logout').addEventListener('click', (e) => {
            e.preventDefault();
            currentUserName = null;
            localStorage.removeItem('pulse_user');
            checkAuth();
        });

        function checkAuth() {
            if (currentUserName) {
                userDisplayName.textContent = currentUserName;
                if (avatarPlug) avatarPlug.textContent = currentUserName.charAt(0).toUpperCase();
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                loadMessages();
            } else {
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        }

        // РЕГИСТРАЦИЯ
        registerBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;

            if (!name || !pass) return showMsg('Заполни имя и пароль!', 'error');
            if (name.length < 3) return showMsg('Имя должно быть от 3 символов!', 'error');

            try {
                const snapshot = await db.ref(`users/${name}`).once();

                if (snapshot.exists()) {
                    showMsg('Это имя уже занято!', 'error');
                } else {
                    await db.ref(`users/${name}`).set({ password: pass });
                    currentUserName = name;
                    localStorage.setItem('pulse_user', name);
                    showMsg('Вход выполнен!', 'success');
                    setTimeout(checkAuth, 500);
                }
            } catch (e) { showMsg('Ошибка сети: ' + e.message, 'error'); }
        });

        // ВХОД
        loginBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;

            if (!name || !pass) return showMsg('Введи имя и пароль!', 'error');

            try {
                const snapshot = await db.ref(`users/${name}`).once();

                if (snapshot.exists() && snapshot.val().password === pass) {
                    currentUserName = name;
                    localStorage.setItem('pulse_user', name);
                    showMsg('Успешный вход!', 'success');
                    setTimeout(checkAuth, 500);
                } else {
                    showMsg('Неверное имя или пароль!', 'error');
                }
            } catch (e) { showMsg('Ошибка сети: ' + e.message, 'error'); }
        });

        logoutBtn.addEventListener('click', () => {
            currentUserName = null;
            localStorage.removeItem('pulse_user');
            checkAuth();
        });

        // ОТПРАВКА СМС
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!messageInput.value.trim() || !currentUserName) return;

            try {
                const messagesRef = db.ref('messages');
                await messagesRef.push({
                    text: messageInput.value,
                    senderName: currentUserName,
                    timestamp: Date.now()
                });
                messageInput.value = '';
            } catch (error) { console.error("Ошибка при отправке: ", error); }
        });

        // ОНЛАЙН ОБНОВЛЕНИЕ ПЕРЕПИСКИ
        function loadMessages() {
            db.ref('messages').on('value', (snapshot) => {
                chatMessages.innerHTML = '';
                const data = snapshot.val();
                if (!data) return;

                Object.keys(data).forEach((key) => {
                    const msgData = data[key];
                    const isMe = msgData.senderName === currentUserName;
                    const messageElement = document.createElement('div');
                    messageElement.classList.add('msg', isMe ? 'outgoing' : 'incoming');
                    
                    messageElement.innerHTML = `
                        <span class="sender">${isMe ? 'Ты' : msgData.senderName}</span>
                        <p>${msgData.text}</p>
                    `;
                    chatMessages.appendChild(messageElement);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        checkAuth();
    </script>
</body>
</html>
