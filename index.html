<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PULSE — Живая Соцсеть</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        
            :root {
        --bg-dark: #020205;              /* Глубокий космический черный фон */
        --panel-bg: rgba(10, 11, 20, 0.7); /* Матовый глассморфизм */
        --border-color: rgba(255, 255, 255, 0.05);
        --text-main: #f5f6f9;
        --text-muted: #565968;
        --neon-blue: #00f3ff;            /* Синий/Циановый неон для активности */
        --neon-purple: #7928ca;          /* Фиолетовый неон для акцентов */
        --neon-cyan: #00f3ff;
        --neon-green: #39ff14;
        --neon-red: #ff3366;             /* Благородный красный для ошибок вместо розового */
        /* Строгий двухцветный фиолетово-синий градиент PULSE */
        --pulse-gradient: linear-gradient(135deg, #7928ca, #00f3ff);
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Inter', sans-serif;
    }

    body {
        /* Фон перенаправлен строго в фиолетово-синюю гамму */
        background: radial-gradient(circle at 80% 20%, #110824, var(--bg-dark) 65%),
                    radial-gradient(circle at 10% 80%, #05161f, var(--bg-dark) 65%);
        color: var(--text-main);
        height: 100vh;
        display: flex;
        overflow: hidden;
    }

    .screen { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
    .hidden { display: none !important; }

    #auth-screen {
        justify-content: center;
        align-items: center;
        background: radial-gradient(circle, #090612 0%, #010103 100%);
        width: 100%;
    }

    .auth-card {
        background: var(--panel-bg);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        padding: 50px 40px;
        border-radius: 28px;
        border: 1px solid var(--border-color);
        width: 100%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(121, 40, 202, 0.15);
    }

    .auth-card h2 {
        font-size: 36px;
        font-weight: 900;
        letter-spacing: 2px;
        background: var(--pulse-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 6px;
    }

    .auth-card p { color: var(--text-muted); margin-bottom: 25px; font-size: 14px; }
    .pulse-heart { font-size: 40px; margin-bottom: 15px; animation: heartbeat 1.2s infinite ease-in-out; color: var(--neon-blue); text-shadow: 0 0 15px var(--neon-blue); }
    
    #auth-status {
        font-size: 13px;
        font-weight: 600;
        margin-bottom: 15px;
        min-height: 18px;
        transition: 0.3s ease;
    }
    .status-error { color: var(--neon-red); text-shadow: 0 0 10px rgba(255, 51, 102, 0.4); }
    .status-success { color: var(--neon-green); text-shadow: 0 0 10px rgba(57, 255, 20, 0.4); }

    input {
        width: 100%;
        padding: 16px 20px;
        background: rgba(2, 2, 4, 0.7);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        color: white;
        font-size: 15px;
        margin-bottom: 18px;
        transition: all 0.3s ease;
    }

    input:focus {
        border-color: var(--neon-blue);
        outline: none;
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        background: rgba(0, 0, 0, 0.9);
    }

    .auth-buttons { display: flex; flex-direction: column; gap: 12px; }
    button { cursor: pointer; border: none; font-weight: 600; transition: 0.2s; }

    .btn-primary {
        padding: 16px;
        background: var(--pulse-gradient);
        background-size: 200% auto;
        color: white;
        border-radius: 14px;
        box-shadow: 0 4px 20px rgba(0, 243, 255, 0.2);
    }
    .btn-primary:hover {
        background-position: right center;
        box-shadow: 0 4px 25px rgba(0, 243, 255, 0.4);
        transform: translateY(-1px);
    }

    /* --- СТИЛИ ДЛЯ ОКНА ОШИБОК ВЗАМЕН ALERT() --- */
    .pulse-modal-overlay {
        position: fixed;
        top: 0; left: 0; width: 100vw; height: 100vh;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        display: flex; justify-content: center; align-items: center;
        z-index: 10000;
        animation: fadeIn 0.2s ease;
    }
    .pulse-modal {
        background: var(--panel-bg);
        border: 1px solid rgba(255, 51, 102, 0.3); /* Красная неоновая каемка */
        padding: 30px; border-radius: 20px;
        max-width: 400px; width: 90%; text-align: center;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(255, 51, 102, 0.1);
    }
    .pulse-modal h4 { color: var(--neon-red); font-size: 20px; margin-bottom: 12px; font-weight: 800; text-transform: uppercase; }
    .pulse-modal p { color: var(--text-main); font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
    .btn-modal-close { padding: 12px 24px; background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid var(--border-color); border-radius: 10px; font-size: 13px; }
    .btn-modal-close:hover { background: var(--neon-red); border-color: transparent; box-shadow: 0 0 15px var(--neon-red); }

    .btn-secondary {
    padding: 16px;
    background: transparent;
    color: #fff;
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 14px;
    }
    .btn-secondary:hover { background: rgba(255, 255, 255, 0.04); }

    /* Класс .sidebar полностью удален, чтобы меню не уходило влево */

    .logo {
        font-size: 26px;
        font-weight: 900;
        letter-spacing: 1px;
        margin-bottom: 45px;
        background: var(--pulse-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }
    .logo .dot { -webkit-text-fill-color: var(--neon-blue); }

    /* Контейнер nav теперь очищен и готов работать внутри нижней док-панели */
    nav { flex: 1; display: flex; flex-direction: column; gap: 10px; }

    .user-profile {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding-top: 20px;
        border-top: 1px solid var(--border-color);
    }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .avatar-plug {
        width: 36px;
        height: 36px;
        background: var(--pulse-gradient);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
    }
    .btn-logout { background: transparent; color: var(--text-muted); font-size: 13px; }
    .btn-logout:hover { color: var(--neon-red); }

    .chat-container { flex: 1; display: flex; flex-direction: column; }

    .chat-header {
        padding: 24px 40px;
        border-bottom: 1px solid var(--border-color);
        background: rgba(13, 14, 24, 0.4);
        backdrop-filter: blur(10px);
    }
    .online-status { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .status-text { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

    .pulse-dot {
        width: 8px;
        height: 8px;
        background: var(--neon-green);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--neon-green);
        animation: dotPulse 1.5s infinite;
    }

    .messages-area {
        flex: 1;
        padding: 40px;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .msg {
        max-width: 55%;
        padding: 14px 20px;
        border-radius: 20px;
        font-size: 15px;
        line-height: 1.5;
        position: relative;
        animation: msgAppear 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
    }
    .msg .sender {
        font-size: 11px;
        color: var(--neon-cyan);
        margin-bottom: 6px;
        display: block;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .msg.incoming {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--border-color);
        align-self: flex-start;
        border-top-left-radius: 4px;
    }
    .msg.outgoing {
        background: linear-gradient(135deg, var(--neon-purple), #2a085c);
        border: 1px solid rgba(0, 243, 255, 0.2);
        align-self: flex-end;
        border-top-right-radius: 4px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(121, 40, 202, 0.1);
    }
    /* Очистили никнейм в исходящих сообщениях от розового цвета */
    .msg.outgoing .sender { color: var(--neon-cyan); }

    .message-input-area {
        padding: 25px 40px;
        display: flex;
        gap: 15px;
        background: var(--panel-bg);
        border-top: 1px solid var(--border-color);
    }

    .message-input-area input { margin: 0; }

    .btn-send {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 28px;
        background: var(--pulse-gradient);
        color: white;
        border-radius: 14px;
        font-size: 15px;
    }
    .btn-send:hover { box-shadow: 0 0 20px rgba(0, 243, 255, 0.4); }

    @keyframes heartbeat {
        0% { transform: scale(1); }
        20% { transform: scale(1.12); }
        40% { transform: scale(1); }
        60% { transform: scale(1.12); }
        100% { transform: scale(1); }
    }

    @keyframes dotPulse {
        0% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(57, 255, 20, 0); }
        100% { box-shadow: 0 0 0 0 rgba(57, 255, 20, 0); }
    }

    @keyframes msgAppear {
        from { opacity: 0; transform: translateY(15px) scale(0.97); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Общий контейнер контента */
    .content-area {
        flex: 1;
        padding: 40px;
        overflow-y: auto;
        background: rgba(2, 2, 4, 0.3);
    }

    .page-section {
        max-width: 900px;
        margin: 0 auto;
        animation: fadeIn 0.4s ease;
    }

    /* Карточка Профиля */
    .profile-card {
        background: var(--panel-bg);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 35px;
        margin-bottom: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .profile-main-info {
        display: flex;
        gap: 35px;
        align-items: center;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 30px;
        margin-bottom: 25px;
    }

    .profile-avatar-zone {
        text-align: center;
    }

    /* Обновленная фиолетово-синяя аватарка */
    .user-avatar {
        width: 110px;
        height: 110px;
        background: var(--pulse-gradient);
        border-radius: 32px; /* Фирменные скругленные квадраты */
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 42px;
        font-weight: 900;
        text-shadow: 0 4px 10px rgba(0,0,0,0.4);
        box-shadow: 0 0 30px rgba(121, 40, 202, 0.25);
    }

    .btn-edit-avatar {
        background: transparent;
        color: var(--text-muted);
        font-size: 11px;
        margin-top: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .btn-edit-avatar:hover { color: var(--neon-cyan); }

    .profile-text-zone h1 {
        font-size: 32px;
        font-weight: 900;
        letter-spacing: -0.5px;
        margin-bottom: 8px;
    }

        /* Инпут статуса прямо в тексте */
    #prof-status-input {
        background: transparent;
        border: none;
        padding: 0;
        margin: 0;
        color: var(--text-muted);
        font-size: 15px;
        width: 100%;
    }
    #prof-status-input:focus {
        color: var(--text-main);
        box-shadow: none;
        border-bottom: 1px solid var(--neon-cyan);
    }

    /* Изменили цвет ссылки профиля со старого розового на строгий синий неон */
    .profile-link {
        font-size: 13px;
        color: var(--neon-cyan);
        font-weight: 600;
        margin-top: 10px;
    }

    /* Статистика */
    .profile-stats {
        display: flex;
        gap: 50px;
    }

    .stat-box h5 {
        color: var(--text-muted);
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .stat-box span {
        font-size: 24px;
        font-weight: 800;
        color: var(--neon-cyan);
    }

    /* Создание Поста */
    .create-post-card {
        background: var(--panel-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 25px;
        margin-bottom: 25px;
    }

    .create-post-card h3 {
        font-size: 16px;
        font-weight: 700;
        margin-bottom: 15px;
        color: #a0a5b5;
    }

    textarea {
        width: 100%;
        height: 90px;
        background: rgba(0, 0, 0, 0.4);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 15px;
        color: white;
        font-size: 15px;
        resize: none;
        transition: 0.3s;
    }
    textarea:focus {
        outline: none;
        border-color: var(--neon-purple);
        box-shadow: 0 0 15px rgba(121, 40, 202, 0.25);
    }

    .post-form-footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 15px;
    }

    .post-attach-btn {
        font-size: 13px;
        color: var(--text-muted);
        cursor: pointer;
    }
    .post-attach-btn:hover { color: var(--text-main); }

    .btn-pulse-post {
        padding: 12px 25px;
        background: var(--pulse-gradient);
        color: white;
        border-radius: 10px;
        font-size: 14px;
        box-shadow: 0 4px 15px rgba(121, 40, 202, 0.2);
    }
    .btn-pulse-post:hover {
        box-shadow: 0 4px 20px rgba(0, 243, 255, 0.3);
        transform: translateY(-1px);
    }

        /* --- СБОРКА И ПАРЕНИЕ НИЖНЕЙ DOCK-ПАНЕЛИ --- */

    /* Контейнер для нижнего меню */
    .bottom-dock-container {
        position: absolute;
        bottom: 25px;
        left: 0;
        width: 100%;
        display: flex;
        justify-content: center;
        pointer-events: none; /* Пропускаем клики сквозь пустую зону */
        z-index: 999;
    }

    /* Сама парящая панель (Строгий фиолетово-синий неон) */
    .bottom-dock {
        pointer-events: auto; /* Возвращаем кликабельность кнопкам */
        display: flex;
        gap: 12px;
        background: rgba(10, 11, 20, 0.75);
        backdrop-filter: blur(30px);
        -webkit-backdrop-filter: blur(30px);
        padding: 10px 15px;
        border-radius: 20px;
        border: 1px solid var(--border-color);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 
                    0 0 30px rgba(121, 40, 202, 0.2);
    }

    /* Компактный элемент меню (Только иконка, без текста) */
    .dock-item {
        position: relative; /* База для позиционирования подсказки */
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        color: #a0a5b5;
        width: 55px;
        height: 55px;
        border-radius: 14px;
        transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .dock-icon {
        font-size: 22px;
        transition: transform 0.25s ease;
    }

    /* Эффекты при наведении: кнопка плавно приподнимается */
    .dock-item:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.03);
        transform: translateY(-5px);
    }
    .dock-item:hover .dock-icon {
        transform: scale(1.1);
    }

    /* Активный пункт меню (Фиолетово-синий градиент PULSE) */
    .dock-item.active {
        background: linear-gradient(135deg, var(--neon-purple), #2a085c);
        color: #fff;
        border: 1px solid rgba(0, 243, 255, 0.4);
        box-shadow: 0 10px 20px rgba(121, 40, 202, 0.3),
                    0 0 15px rgba(0, 243, 255, 0.25);
    }

    /* Кнопка выхода (Строгий неоново-красный оттенок при наведении) */
    .logout-item:hover {
        background: rgba(255, 51, 102, 0.15);
        color: var(--neon-red);
    }

    /* --- РЕАЛИЗАЦИЯ ВСПЛЫВАЮЩИХ ПОДСКАЗОК (TOOLTIPS) НА ЧИСТОМ CSS --- */
    .dock-item::after {
        content: attr(data-tooltip);
        position: absolute;
        bottom: 70px; /* Появление строго НАД иконкой */
        left: 50%;
        transform: translateX(-50%) translateY(10px);
        background: rgba(10, 10, 18, 0.95);
        backdrop-filter: blur(10px);
        color: #fff;
        padding: 6px 12px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-radius: 8px;
        border: 1px solid rgba(0, 243, 255, 0.3);
        box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        white-space: nowrap;
        opacity: 0;
        pointer-events: none;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Плавный запуск подсказки при наведении мыши */
    .dock-item:hover::after {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }

    </style>
</head>
<body>

    <!-- Окно авторизации -->
    <div id="auth-screen" class="screen">
        <div class="auth-card">
            <div class="pulse-heart">💚</div>
            <h2>PULSE</h2>
            <p>Подключись к единому ритму</p>
            
            <div id="auth-status"></div>

            <input type="text" id="email-input" placeholder="Введите ваше имя">
            <input type="password" id="password-input" placeholder="Секретный пароль">
            <div class="auth-buttons">
                <button id="login-btn" class="btn-primary">Войти</button>
                <button id="register-btn" class="btn-secondary">Создать аккаунт</button>
            </div>
        </div>
    </div>

            <!-- Главный экран соцсети с нижним меню -->
    <div id="app-screen" class="screen hidden">
    
        <!-- Верхняя контентная зона -->
        <main class="content-area">
        
            <!-- РАЗДЕЛ 1: МОЙ ПУЛЬС (ПРОФИЛЬ) -->
            <div id="page-profile" class="page-section">
                <!-- Карточка Профиля -->
                <div class="profile-card">
                    <div class="profile-main-info">
                        <div class="profile-avatar-zone">
                            <div class="user-avatar" id="prof-avatar">P</div>
                            <button class="btn-edit-avatar">⚡ Сменить код</button>
                        </div>
                        <div class="profile-text-zone">
                            <div class="logo-mini">PULSE<span class="dot">.</span></div>
                            <h1 id="prof-name">Загрузка...</h1>
                            <div class="profile-status-wrapper">
                                <input type="text" id="prof-status-input" value="Настроить частоту пульса..." placeholder="Твой статус">
                            </div>
                        </div>
                    </div>
                
                    <!-- Новые строгие показатели в сети -->
                    <div class="profile-stats">
                        <div class="stat-box"><h5>Синхронизации</h5><span id="stat-friends">0</span></div>
                        <div class="stat-box"><h5>Публикации</h5><span id="stat-posts">0</span></div>
                        <div class="stat-box"><h5>Треки</h5><span id="stat-tracks">0</span></div>
                    </div>
                </div>

                <!-- Стена постов (Без "вибраций") -->
                <div class="wall-section">
                    <div class="create-post-card">
                        <h3>Опубликовать мысль в сеть</h3>
                        <form id="post-form">
                            <textarea id="post-text-input" placeholder="Поделитесь тем, что происходит вокруг..." required></textarea>
                            <div class="post-form-footer">
                                <div class="post-attach-btn">➕ Добавить медиа</div>
                                <button type="submit" class="btn-pulse-post">Импульс ⚡</button>
                            </div>
                        </form>
                    </div>
                    <div id="profile-wall-posts" class="posts-feed">
                        <!-- Посты -->
                    </div>
                </div>
            </div>

            <!-- РАЗДЕЛ 2: СООБЩЕНИЯ -->
            <div id="page-messages" class="page-section hidden">
                <div class="profile-card">
                    <h2>Твои Диалоги</h2>
                    <p style="color: var(--text-muted); margin-top: 10px;">Раздел сообщений в разработке...</p>
                </div>
            </div>

        </main>

        <!-- 🌌 ОБНОВЛЕННОЕ МИНИМАЛИСТИЧНОЕ НИЖНЕЕ МЕНЮ С ТУЛТИПАМИ -->
        <div class="bottom-dock-container">
            <nav class="bottom-dock">
                <a href="#" id="link-profile" class="dock-item active" data-target="page-profile" data-tooltip="Мой Пульс">
                    <span class="dock-icon">👤</span>
                </a>
                <a href="#" id="link-news" class="dock-item" data-target="page-news" data-tooltip="Лента">
                    <span class="dock-icon">📰</span>
                </a>
                <a href="#" id="link-messages" class="dock-item" data-target="page-messages" data-tooltip="Сообщения">
                    <span class="dock-icon">💬</span>
                </a>
                <a href="#" id="link-music" class="dock-item" data-target="page-music" data-tooltip="Музыка">
                    <span class="dock-icon">🎵</span>
                </a>
                <a href="#" id="link-logout" class="dock-item logout-item" data-tooltip="Выйти">
                    <span class="dock-icon">🚪</span>
                </a>
            </nav>
        </div>

    </div>

    <!-- Полная логика сетевого REST-моста PULSE -->
    <script>
        // 1. Ядро Firebase App
        (function() {
            'use strict';
            class FirebaseApp {
                constructor(options, name) { 
                    this.options = options; 
                    this.name = name || '[DEFAULT]'; 
                }
                database() { return window.firebase.database(this); }
            }
            const appsMap = new Map();
            const firebaseNamespace = {
                initializeApp: function(options, config) {
                    const name = (config && config.name) || '[DEFAULT]';
                    if (appsMap.has(name)) return appsMap.get(name);
                    const newApp = new FirebaseApp(options, name);
                    appsMap.set(name, newApp); 
                    return newApp;
                },
                app: function(name) {
                    const appName = name || '[DEFAULT]';
                    if (!appsMap.has(appName)) throw new Error("No Firebase App created");
                    return appsMap.get(appName);
                }
            };
            window.firebase = firebaseNamespace;
        })();

        // 2. Сетевой мост Realtime Database
        (function() {
            'use strict';
            if (typeof firebase === 'undefined') return;
            class DataSnapshotCompat {
                constructor(key, value) { this.key = key; this._value = value; }
                val() { return this._value; }
                exists() { return this._value !== null && this._value !== undefined; }
            }
            class ReferenceCompat {
                constructor(path, dbRef) { 
                    this.path = path || ''; 
                    this.db = dbRef; 
                }
                child(childPath) { 
                    return new ReferenceCompat(this.path + '/' + childPath, this.db); 
                }
                getURL() {
                    // НАМЕРТВО ЗАШИВАЕМ ТВОЙ URL: Теперь никакой старый код не сможет его стереть!
                    const base = "https://pulse-66146-default-rtdb.europe-west1.firebasedatabase.app";
                    return base + '/' + this.path + '.json?auth=' + this.db.key;
                }
                set(value) { return fetch(this.getURL(), { method: 'PUT', body: JSON.stringify(value) }).then(r => r.json()); }
                push(value) {
                    const genId = 'id_' + Math.floor(Math.random() * 1000000);
                    const newRef = this.child(genId);
                    if (value !== undefined) newRef.set(value); return newRef;
                }
                once() { return fetch(this.getURL()).then(r => r.json()).then(data => new DataSnapshotCompat(null, data)); }
                on(type, callback) {
                    const run = () => { this.once().then(snap => { if (callback) callback(snap); }); };
                    run();
                    const intervalId = setInterval(run, 3000);
                    window._fb_intervals = window._fb_intervals || []; window._fb_intervals.push(intervalId);
                    return callback;
                }
            }

            class DatabaseCompat {
                constructor(app) { 
                    const currentApp = app || firebase.app();
                    this.key = currentApp.options.apiKey; 
                }
                ref(path) { return new ReferenceCompat(path, this); }
            }
            firebase.database = function(app) { return new DatabaseCompat(app || firebase.app()); };
        })();
        // 3. Инициализация твоей личной базы данных PULSE
        const firebaseConfig = {
            apiKey: "AIzaSyADDpr8MTqi33HmM8mN2b2r-CB9bCRPy4c",
            authDomain: "pulse-66146.firebaseapp.com", // ИСПРАВЛЕНО (добавлено имя проекта, убрано "://")
            projectId: "pulse-66146",
            storageBucket: "pulse-66146.firebasestorage.app",
            messagingSenderId: "346611623663",
            appId: "1:346611623663:web:d7b319b063da543ed1dd1a",
            measurementId: "G-3FXVBG5PJT",
            databaseURL: "https://pulse-66146-default-rtdb.europe-west1.firebasedatabase.app" // ИСПРАВЛЕНО (ваш точный URL)
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();


        // Поиск элементов на экране (Очищено от старого сайдбара)
        const authScreen = document.getElementById('auth-screen');
        const appScreen = document.getElementById('app-screen');
        const usernameInput = document.getElementById('email-input');
        const passwordInput = document.getElementById('password-input');
        const loginBtn = document.getElementById('login-btn');
        const registerBtn = document.getElementById('register-btn');
        const logoutBtn = document.getElementById('link-logout'); 
        const userDisplayName = document.getElementById('prof-name'); 
        const messageForm = document.getElementById('post-form'); 
        const messageInput = document.getElementById('post-text-input');
        const avatarPlug = document.getElementById('prof-avatar'); 
        const authStatus = document.getElementById('auth-status');

        let currentUserName = localStorage.getItem('pulse_user') || null;

        function showMsg(text, type) {
            authStatus.textContent = text;
            authStatus.className = type === 'error' ? 'status-error' : 'status-success';
            setTimeout(() => { authStatus.textContent = ''; }, 4000);
        }

        function checkAuth() {
            if (currentUserName) {
                const formattedName = currentUserName.charAt(0).toUpperCase() + currentUserName.slice(1);
                if (userDisplayName) userDisplayName.textContent = formattedName;
                if (avatarPlug) avatarPlug.textContent = currentUserName.charAt(0).toUpperCase();
                
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                loadMessages();
            } else {
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
            }
        }

        // РЕГИСТРАЦИЯ
        registerBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;

            if (!name || !pass) return showMsg('Заполни имя и пароль, бро!', 'error');
            if (name.length < 3) return showMsg('Имя должно быть от 3 символов!', 'error');
            if (pass.length < 4) return showMsg('Пароль должен быть от 4 символов!', 'error');

            try {
                const snapshot = await db.ref(`users/${name}`).once();

                if (snapshot.exists()) {
                    showMsg('Это имя уже занято!', 'error');
                } else {
                    await db.ref(`users/${name}`).set({ password: pass });
                    currentUserName = name;
                    localStorage.setItem('pulse_user', name);
                    showMsg('Вход выполнен!', 'success');
                    setTimeout(checkAuth, 500);
                }
            } catch (e) { showMsg('Ошибка сети!', 'error'); }
        });

        // ВХОД
        loginBtn.addEventListener('click', async () => {
            const name = usernameInput.value.trim().toLowerCase();
            const pass = passwordInput.value;

            if (!name || !pass) return showMsg('Введи имя и пароль!', 'error');

            try {
                const snapshot = await db.ref(`users/${name}`).once();

                if (snapshot.exists() && snapshot.val().password === pass) {
                    currentUserName = name;
                    localStorage.setItem('pulse_user', name);
                    showMsg('Успешный вход!', 'success');
                    setTimeout(checkAuth, 500);
                } else {
                    showMsg('Неверное имя или пароль!', 'error');
                }
            } catch (e) { showMsg('Ошибка сети!', 'error'); }
        });

        if (logoutBtn) {
            logoutBtn.addEventListener('click', (e) => {
                e.preventDefault();
                currentUserName = null;
                localStorage.removeItem('pulse_user');
                checkAuth();
            });
        }

        // Логика плавного переключения нижнего меню (Dock)
        const dockItems = document.querySelectorAll('.dock-item:not(.logout-item)');
        const pageSections = document.querySelectorAll('.page-section');

        dockItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                dockItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');

                pageSections.forEach(section => section.classList.add('hidden'));
                
                const targetId = item.getAttribute('data-target');
                const targetSection = document.getElementById(targetId);
                if (targetSection) {
                    targetSection.classList.remove('hidden');
                }
            });
        });

        // ОТПРАВКА ИМПУЛЬСА (ПОСТА) НА СТЕНУ
        if (messageForm) {
            messageForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (!messageInput.value.trim() || !currentUserName) return;

                try {
                    const messagesRef = db.ref('messages');
                    await messagesRef.push({
                        text: messageInput.value,
                        senderName: currentUserName,
                        timestamp: Date.now()
                    });
                    messageInput.value = '';
                } catch (error) { console.error("Ошибка при отправке: ", error); }
            });
        }

        // ЗАГРУЗКА ВИБРАЦИЙ (ПОСТОВ) НА СТЕНУ
        function loadMessages() {
            const wallFeed = document.getElementById('profile-wall-posts');
            if (!wallFeed) return;

            db.ref('messages').on('value', (snapshot) => {
                wallFeed.innerHTML = '';
                const data = snapshot.val();
                if (!data) return;

                Object.keys(data).forEach((key) => {
                    const msgData = data[key];
                    const postElement = document.createElement('div');
                    
                    postElement.style.background = 'var(--panel-bg)';
                    postElement.style.border = '1px solid var(--border-color)';
                    postElement.style.padding = '20px';
                    postElement.style.borderRadius = '16px';
                    postElement.style.marginBottom = '15px';
                    postElement.style.backdropFilter = 'blur(10px)';
                    
                    const name = msgData.senderName.charAt(0).toUpperCase() + msgData.senderName.slice(1);
                    
                    postElement.innerHTML = `
                        <strong style="color: var(--neon-cyan); display:block; margin-bottom:8px; font-weight:700;">${name}</strong>
                        <p style="color: var(--text-main); font-size:15px; line-height:1.4;">${msgData.text}</p>
                    `;
                    wallFeed.insertBefore(postElement, wallFeed.firstChild);
                });
            });
        }

        checkAuth();
    </script>
</body>
</html>
